<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b12" />
  <title>小呂叔叔與姐姐新婚祝賀</title>
  <style>
    :root {
      --bg: #090910;
      --text: #fffaf2;
      --muted: rgba(255,255,255,.74);
      --gold: #f2d39b;
      --pink: #ffb8c9;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      background: var(--bg);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC",
                   "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,184,201,.13), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(242,211,155,.14), transparent 35%),
        linear-gradient(180deg, #0b0b13, #090910 55%, #11101a);
      overflow-x: hidden;
    }

    section {
      position: relative;
      min-height: 100svh;
      scroll-snap-align: start;
      display: grid;
      place-items: center;
      padding: 48px 24px;
      isolation: isolate;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(28px);
      opacity: .45;
      animation: drift 9s ease-in-out infinite alternate;
      z-index: -2;
    }

    .glow.one {
      width: 280px;
      height: 280px;
      background: rgba(255,184,201,.28);
      top: 8%;
      left: -90px;
    }

    .glow.two {
      width: 340px;
      height: 340px;
      background: rgba(242,211,155,.22);
      right: -120px;
      bottom: 8%;
      animation-delay: -2s;
    }

    .content {
      width: min(860px, 100%);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero .eyebrow {
      margin: 0 0 18px;
      font-size: clamp(.9rem, 2vw, 1.1rem);
      letter-spacing: .28em;
      color: var(--gold);
      opacity: 0;
      animation: riseIn .9s ease .15s forwards;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.8rem, 9vw, 6.8rem);
      line-height: 1.04;
      letter-spacing: -.04em;
      font-weight: 750;
      opacity: 0;
      transform: translateY(28px) scale(.96);
      filter: blur(12px);
      animation: heroIn 1.3s cubic-bezier(.2,.7,.2,1) .35s forwards;
    }

    .hero h1 span {
      display: block;
      margin-top: 12px;
      background: linear-gradient(90deg, #fff, var(--gold), #fff0f4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }


    .hero {
      background:
        radial-gradient(circle at 50% 18%, rgba(255,244,214,.12), transparent 30%),
        linear-gradient(180deg, #111526 0%, #17182a 48%, #17131d 100%);
    }

    .hero-art {
      width: min(760px, 96vw);
      margin: 0 auto 20px;
      opacity: 0;
      transform: translateY(16px);
      animation: riseIn 1.1s ease .05s forwards;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.2));
    }

    .hero-art svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .hero-art .ink {
      fill: none;
      stroke: rgba(255,248,231,.88);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hero-art .soft { stroke: rgba(242,211,155,.65); }
    .hero-art .accent { stroke: rgba(255,184,201,.72); }
    .hero-art .fill-soft { fill: rgba(242,211,155,.10); stroke: rgba(242,211,155,.72); }

    .hero-art .star {
      transform-box: fill-box;
      transform-origin: center;
      animation: twinkle 2.8s ease-in-out infinite;
    }

    .hero-art .star:nth-child(2n) { animation-delay: -1.1s; }
    .hero-art .fire {
      transform-box: fill-box;
      transform-origin: center bottom;
      animation: fireFlicker 1.25s ease-in-out infinite alternate;
    }

    .hero .content {
      width: min(900px, 100%);
    }

    .hero-heading {
      display: grid;
      justify-items: center;
      gap: 12px;
      margin-top: -2px;
    }

    .garage-logo {
      width: clamp(92px, 14vw, 138px);
      height: auto;
      display: block;
      opacity: 0;
      transform: translateY(14px) scale(.94);
      filter: drop-shadow(0 8px 24px rgba(242,211,155,.18));
      animation: logoIn 1s cubic-bezier(.2,.8,.2,1) .18s forwards;
    }

    .wedding-title {
      margin: 0;
      font-size: clamp(2.25rem, 7.4vw, 5.4rem);
      line-height: 1.04;
      letter-spacing: -.04em;
      font-weight: 760;
      opacity: 0;
      transform: translateY(24px) scale(.97);
      filter: blur(10px);
      animation: heroIn 1.25s cubic-bezier(.2,.7,.2,1) .32s forwards;
      text-shadow: 0 8px 30px rgba(0,0,0,.35);
    }

    .wedding-title span {
      display: block;
      margin-top: 8px;
      background: linear-gradient(90deg, #fff7e8, var(--gold), #ffd7e1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-wish {
      margin: 3px 0 0;
      color: rgba(255,255,255,.82);
      font-size: clamp(1rem, 2.7vw, 1.36rem);
      line-height: 1.8;
      letter-spacing: .04em;
      opacity: 0;
      transform: translateY(18px);
      animation: riseIn .95s ease .68s forwards;
    }

    .hero-wish strong {
      color: #fff8eb;
      font-weight: 650;
    }

    .hero h1 {
      font-size: clamp(2.35rem, 7vw, 5.8rem);
      text-shadow: 0 8px 30px rgba(0,0,0,.35);
    }

    .paper-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.18'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    @keyframes logoIn {
      to { opacity: .96; transform: translateY(0) scale(1); }
    }

    @keyframes twinkle {
      0%,100% { opacity: .35; transform: scale(.85); }
      50% { opacity: 1; transform: scale(1.12); }
    }

    @keyframes fireFlicker {
      from { transform: scaleY(.92) rotate(-1deg); opacity: .78; }
      to { transform: scaleY(1.08) rotate(1deg); opacity: 1; }
    }

    .scroll-hint {
      position: absolute;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      color: rgba(255,255,255,.62);
      font-size: .85rem;
      letter-spacing: .18em;
      text-align: center;
      animation: bob 1.8s ease-in-out infinite;
    }

    .scroll-hint::after {
      content: "↓";
      display: block;
      margin-top: 8px;
      font-size: 1.25rem;
    }

    .message-card {
      padding: clamp(30px, 6vw, 64px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 32px;
      background: rgba(255,255,255,.055);
      box-shadow: 0 24px 80px rgba(0,0,0,.38);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: cardIn 1s cubic-bezier(.2,.8,.2,1) both;
      animation-timeline: view();
      animation-range: entry 5% cover 35%;
    }

    .heart {
      font-size: 2rem;
      margin-bottom: 14px;
      animation: pulse 1.7s ease-in-out infinite;
    }

    .message-card h2 {
      margin: 0 0 24px;
      font-size: clamp(2rem, 6vw, 4.2rem);
      letter-spacing: -.03em;
    }

    .message-card p {
      margin: 0 auto 18px;
      max-width: 720px;
      font-size: clamp(1.08rem, 2.8vw, 1.42rem);
      line-height: 1.95;
      color: var(--muted);
    }

    .message-card .blessing {
      margin-top: 24px;
      color: var(--text);
      font-weight: 700;
      font-size: clamp(1.15rem, 3vw, 1.5rem);
    }

    .signature {
      margin-top: 28px;
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: .12em;
      opacity: 1;
      transform: translateY(0);
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.8);
      box-shadow: 0 0 16px rgba(242,211,155,.8);
      animation: floatUp linear infinite;
      opacity: 0;
      z-index: -1;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(55px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes heroIn {
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      from { transform: translate3d(0,0,0) scale(1); }
      to { transform: translate3d(28px,-20px,0) scale(1.08); }
    }

    @keyframes bob {
      0%,100% { transform: translateX(-50%) translateY(0); opacity: .55; }
      50% { transform: translateX(-50%) translateY(8px); opacity: 1; }
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.13); }
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(.7); opacity: 0; }
      15% { opacity: .75; }
      85% { opacity: .55; }
      100% { transform: translateY(-20vh) scale(1.25); opacity: 0; }
    }

    @media (max-width: 600px) {
      section { padding: 26px 18px; }
      .hero-art { margin-bottom: 10px; }
      .hero-heading { gap: 8px; }
      .garage-logo { width: 88px; }
      .wedding-title { font-size: clamp(2.15rem, 12vw, 3.6rem); }
      .hero-wish { font-size: .98rem; line-height: 1.65; }
      .message-card { border-radius: 24px; }
      .message-card p { line-height: 1.8; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

        <p class="blessing">祝新婚愉快、百年好合、幸福美滿、心想事成！</p>
        <div class="signature">— 韋銘 敬賀 —</div>
      </article>
    </div>
  </section>

  <script>
    const messageSection = document.getElementById('message');
    for (let i = 0; i < 24; i++) {
      const particle = document.createElement('span');
      particle.className = 'particle';
      particle.style.left = `${Math.random() * 100}%`;
      particle.style.animationDuration = `${7 + Math.random() * 8}s`;
      particle.style.animationDelay = `${-Math.random() * 12}s`;
      particle.style.width = particle.style.height = `${3 + Math.random() * 5}px`;
      messageSection.appendChild(particle);
    }
  </script>
</body>
